<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002D62"/>
      <stop offset="100%" style="stop-color:#004C99"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8e6ff"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Línea verde inferior decorativa -->
  <rect x="8" y="54" width="48" height="4" rx="2" fill="#00A86B"/>
  <!-- Letra A -->
  <text x="32" y="47" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="44" 
        font-weight="700"
        fill="url(#letter)"
        text-anchor="middle"
        letter-spacing="-1">A</text>
  <!-- Punto verde sobre la A -->
  <circle cx="47" cy="13" r="5" fill="#00A86B"/>
</svg>
